<!DOCTYPE html>
<html>
<head>
    <title>ComfortPing</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f8;
            padding: 40px;
        }
        h1 {
            color: #2c3e50;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 400px;
        }
        input, button {
            margin: 8px 0;
            width: 100%;
            padding: 8px;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h1>ComfortPing – Student Feedback</h1>

<div class="card">
    <input type="text" placeholder="Student ID">
    <input type="number" placeholder="Food Quality (1-5)">
    <input type="number" placeholder="Hygiene (1-5)">
    <input type="number" placeholder="Room Comfort (1-5)">
    <button>Submit Feedback</button>
</div>

</body>
</html>
